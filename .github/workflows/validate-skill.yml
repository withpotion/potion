name: Validate Skill

on:
  push:
    paths:
      - 'skills/**'
      - '.claude-plugin/**'
  pull_request:
    paths:
      - 'skills/**'
      - '.claude-plugin/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify skill structure
        run: |
          set -e

          # SKILL.md must exist
          if [ ! -f "skills/channel/SKILL.md" ]; then
            echo "ERROR: skills/channel/SKILL.md not found"
            exit 1
          fi
          echo "✓ skills/channel/SKILL.md exists"

          # Must have YAML frontmatter
          if ! grep -q "^---" skills/channel/SKILL.md; then
            echo "ERROR: SKILL.md missing YAML frontmatter"
            exit 1
          fi
          echo "✓ frontmatter block present"

          # Must have name field
          if ! grep -q "^name:" skills/channel/SKILL.md; then
            echo "ERROR: SKILL.md missing 'name:' field"
            exit 1
          fi
          echo "✓ name field present"

          # Must have description field
          if ! grep -q "^description:" skills/channel/SKILL.md; then
            echo "ERROR: SKILL.md missing 'description:' field"
            exit 1
          fi
          echo "✓ description field present"

          # Plugin manifests must exist
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          echo "✓ .claude-plugin/plugin.json exists"

          if [ ! -f ".claude-plugin/marketplace.json" ]; then
            echo "ERROR: .claude-plugin/marketplace.json not found"
            exit 1
          fi
          echo "✓ .claude-plugin/marketplace.json exists"

          # Plugin manifests must be valid JSON
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'))"
          echo "✓ plugin.json is valid JSON"

          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'))"
          echo "✓ marketplace.json is valid JSON"

          echo ""
          echo "All checks passed."

      - name: Validate marketplace.json schema
        run: |
          set -e

          node -e "
            const m = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'));

            // name must be a string
            if (!m.name || typeof m.name !== 'string') {
              console.error('ERROR: marketplace.json missing required \"name\" string');
              process.exit(1);
            }
            console.log('✓ marketplace name: ' + m.name);

            // owner must be an object with a name
            if (!m.owner || typeof m.owner !== 'object') {
              console.error('ERROR: marketplace.json missing required \"owner\" object');
              process.exit(1);
            }
            if (!m.owner.name || typeof m.owner.name !== 'string') {
              console.error('ERROR: marketplace.json owner.name must be a non-empty string');
              process.exit(1);
            }
            console.log('✓ owner object valid');

            // plugins must be a non-empty array
            if (!Array.isArray(m.plugins) || m.plugins.length === 0) {
              console.error('ERROR: marketplace.json missing required \"plugins\" array (or it is empty)');
              process.exit(1);
            }
            console.log('✓ plugins array present (' + m.plugins.length + ' plugin(s))');

            // Each plugin must have name, description, source
            for (const [i, p] of m.plugins.entries()) {
              if (!p.name) { console.error('ERROR: plugins[' + i + '] missing name'); process.exit(1); }
              if (!p.description) { console.error('ERROR: plugins[' + i + '] missing description'); process.exit(1); }
              if (!p.source) { console.error('ERROR: plugins[' + i + '] missing source'); process.exit(1); }
              console.log('✓ plugins[' + i + '] (' + p.name + ') has required fields');
            }

            console.log('');
            console.log('Marketplace schema validation passed.');
          "

      - name: Validate plugin.json schema
        run: |
          set -e
          node -e "
            const p = JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'));
            if (!p.name) { console.error('ERROR: plugin.json missing name'); process.exit(1); }
            if (!p.description) { console.error('ERROR: plugin.json missing description'); process.exit(1); }
            console.log('✓ plugin.json valid (name: ' + p.name + ')');
          "

      - name: Test skill discovery
        run: npx --yes skills@latest list ./skills/channel/SKILL.md 2>/dev/null || echo "(skills list command not available, skipping)"
